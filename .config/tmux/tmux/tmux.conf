##### TPM #####################################################

set-environment -gF TMUX_PLUGIN_MANAGER_PATH '#{HOME}/.local/share/tmux/plugins'

if 'test ! -d "#{TMUX_PLUGIN_MANAGER_PATH}/tpm"' {
  run 'mkdir -p "#{TMUX_PLUGIN_MANAGER_PATH}"'
  run 'git clone https://github.com/tmux-plugins/tpm "#{TMUX_PLUGIN_MANAGER_PATH}/tpm"'
}

##### Plugins #################################################

set -g @plugin 'tmux-plugins/tpm'

# basic
set -g @plugin 'tmux-plugins/tmux-yank'

# theme / status
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'dreknix/tmux-primary-ip'

# tooling
set -g @plugin 'omerxx/tmux-sessionx'

##### General #################################################

set -g prefix C-t
bind C-t send-prefix
unbind C-b

set -g base-index 1
set -g pane-base-index 1
set -g renumber-window on

set -g allow-rename off
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100

# set -g default-terminal 'screen-256color'
set -g default-terminal 'tmux-256color'

set -ag terminal-overrides ',xterm-256color*:RGB'

## Basic Option (temp)

set -g xterm-keys on

set -g default-shell /bin/zsh
set -g repeat-time 0
set -g focus-events on
set -sg escape-time 10
set -g history-limit 50000
set -g mode-keys vi

bind s split-window -v
bind v split-window -h

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

bind -r C-h resize-pane -L 10
bind -r C-j resize-pane -D 4
bind -r C-k resize-pane -U 4
bind -r C-l resize-pane -R 10

bind -r e kill-pane -a

set -g set-clipboard on

##### Catppuccin ##############################################

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_status 'no'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text '#W'

set -g @catppuccin_window_current_color '#{E:@thm_surface_2}'
set -g @catppuccin_status_module_text_bg '#{E:@thm_surface_0}'
set -g @catppuccin_date_time_text ' %Y/%m/%d %H:%M'

# Load Catppuccin before custom modules that depend on its variables.
run '#{TMUX_PLUGIN_MANAGER_PATH}/tmux/catppuccin.tmux'

source -F '#{d:current_file}/custom_modules/ctp_cpu.conf'
source -F '#{d:current_file}/custom_modules/ctp_memory.conf'
source -F '#{d:current_file}/custom_modules/primary_ip.conf'

##### Status line #############################################

set -g status-left '#{E:@catppuccin_status_session}#[fg=#{E:@thm_surface_0},bg=default] '

set -gF status-right '#{E:@catppuccin_status_primary_ip}#[fg=#{E:@thm_surface_0},bg=default] '
set -agF status-right '#{E:@catppuccin_status_ctp_cpu}#[fg=#{E:@thm_surface_0},bg=default] '
set -agF status-right '#{E:@catppuccin_status_ctp_memory}#[fg=#{E:@thm_surface_0},bg=default] '

if 'test -n "$(find /sys/class/power_supply -maxdepth 1 -name "BAT*" 2>/dev/null)"' {
  set -agF status-right '#{E:@catppuccin_status_battery}#[fg=#{E:@thm_surface_0},bg=default] '
}

set -ag status-right '#{E:@catppuccin_status_date_time}#[fg=#{E:@thm_surface_0},bg=default] '

##### Initialize TPM ##########################################

run '#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'
